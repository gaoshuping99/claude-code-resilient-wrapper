name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install expect & shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq expect shellcheck tcl

      - name: bash -n install.sh
        run: bash -n install.sh

      - name: shellcheck install.sh
        run: shellcheck install.sh

      - name: Tcl block-completeness check
        # expect 没有 dry-run；用 tclsh 的 info complete 验证整体大括号/引号匹配
        run: |
          tclsh <<'TCL'
          set fp [open "bin/claude-resilient.exp" r]
          set src [read $fp]
          close $fp
          if {[info complete $src]} {
              puts "OK: bin/claude-resilient.exp Tcl block structure complete"
              exit 0
          } else {
              puts "FAIL: brace/quote mismatch"
              exit 1
          }
          TCL

      - name: Verify executable bits
        run: |
          for f in bin/claude-resilient.exp install.sh; do
            if [ ! -x "$f" ]; then
              echo "FAIL: $f is not executable"
              exit 1
            fi
            echo "OK: $f executable"
          done

  smoke:
    name: Smoke test (fake claude)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install expect
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq expect

      - name: Run wrapper against a fake claude that emits a socket error
        # 用 CLAUDE_BIN 把真实 claude 替换成一段假 stdout，验证 wrapper:
        #   1. 能成功 spawn
        #   2. 能识别错误模式
        #   3. 注入「继续」后假进程能正常退出
        run: |
          cat > /tmp/fake-claude.sh <<'SH'
          #!/usr/bin/env bash
          echo "fake claude starting"
          sleep 1
          echo "API Error: socket hang up — fake injected for CI"
          # 等 wrapper 注入「继续」并被 cat 读到
          read -r line
          echo "fake claude received: $line"
          exit 0
          SH
          chmod +x /tmp/fake-claude.sh

          # 后台跑 wrapper，最多等 30 秒
          export CLAUDE_BIN=/tmp/fake-claude.sh
          timeout 30 ./bin/claude-resilient.exp 2>&1 | tee /tmp/wrapper-out.log || true

          echo "---- wrapper output ----"
          cat /tmp/wrapper-out.log

          echo "---- assertions ----"
          grep -q "命中 'socket' 错误" /tmp/wrapper-out.log \
            && echo "✓ 错误模式被正确识别"
          grep -q "fake claude received: 继续" /tmp/wrapper-out.log \
            && echo "✓ 「继续」被正确注入到子进程 stdin"
